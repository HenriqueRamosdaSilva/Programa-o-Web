<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Administrativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>Painel Administrativo</h1>
        </header>

        <aside class="sidebar">
            <nav class="nav-menu">
                <ul>
                    <li><a href="#">Dashboard</a></li>
                    <li><a href="#">Usuários</a></li>
                    <li><a href="#">Relatórios</a></li>
                    <li><a href="#">Configurações</a></li>
                </ul>
            </nav>
        </aside>

        <main class="dashboard">
            <div class="cards">
                <div class="card card-vendas"><h3>Vendas</h3></div>
                <div class="card card-usuarios"><h3>Usuários</h3></div>
                <div class="card card-pedidos"><h3>Pedidos</h3></div>
                <div class="card card-estoque"><h3>Estoque</h3></div>
                <div class="card card-financeiro"><h3>Financeiro</h3></div>
                <div class="card card-alertas"><h3>Alertas</h3></div>
            </div>
        </main>
    </div>

</body>
</html>
